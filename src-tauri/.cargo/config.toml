# Windows 7 build configuration (Tier-3 `x86_64-win7-windows-msvc` target).
#
# The target is set HERE rather than via `tauri build --target ...` because the
# tauri v1 CLI validates an explicit `--target` against `rustup target list`,
# which never contains a Tier-3 target (it has no prebuilt std to install). By
# setting it in cargo config, cargo builds for Win7 and tauri finds the binary
# from cargo's build output — no CLI validation.
#
# std is compiled from source (`build-std`) because the Tier-3 target ships no
# prebuilt std; this needs the nightly toolchain + the `rust-src` component
# (see ../rust-toolchain.toml).
[build]
target = "x86_64-win7-windows-msvc"

[unstable]
build-std = ["std", "panic_abort"]

# Statically link the entire C runtime (libcmt + libvcruntime + libucrt), so
# the exe has zero api-ms-win-crt-*.dll / vcruntime imports. The UCRT ships
# inbox only on Windows 10+; stock Win7 SP1 lacks it (KB2999226 / VC++ 2015+
# redist territory), so a dynamically-linked UCRT fails to load there with
# "api-ms-win-crt-math-l1-1-0.dll is missing". `cc`-compiled C deps
# (libsqlite3-sys) see the feature via CARGO_CFG_TARGET_FEATURE and switch to
# /MT, so all objects agree on the CRT.
#
# CAUTION: this flag alone is NOT enough. The tauri v1 CLI sets
# STATIC_VCRUNTIME=true, making tauri-build emit "hybrid CRT" linker args that
# force the UCRT dynamic again (/DEFAULTLIB:ucrt.lib, /NODEFAULTLIB:libucrt.lib)
# and override this flag at link level. build.rs opts out of that for the Win7
# target (STATIC_VCRUNTIME=false) — keep both pieces in sync. And keep CI free
# of a RUSTFLAGS env var: it would silently replace these config rustflags.
[target.x86_64-win7-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
