# Vendored from crates.io webview2-com-sys 0.19.0 (see README.md). One
# functional change: the bindings link the *dynamic* WebView2Loader.dll
# instead of WebView2LoaderStatic.lib, whose telemetry imports
# EventSetInformation from advapi32 — an API absent on stock Windows 7 SP1,
# which made the final exe fail to load there. The upstream bindgen/NuGet
# build machinery and non-x64 libs are stripped.
[package]
name = "webview2-com-sys"
version = "0.19.0"
edition = "2021"
rust-version = "1.61"
description = "Bindings generated with the windows crate for the WebView2 COM APIs"
license = "MIT"
repository = "https://github.com/wravery/webview2-rs"

[dependencies.windows]
version = "0.39.0"
features = [
    "implement",
    "Win32_Foundation",
    "Win32_Globalization",
    "Win32_System_Com",
    "Win32_System_Ole",
    "Win32_System_WinRT",
    "Win32_UI_WindowsAndMessaging",
]

[features]
# Kept only so dependents that name it still resolve; the vendored build.rs
# never downloads the SDK via NuGet.
default = ["nuget"]
nuget = []
