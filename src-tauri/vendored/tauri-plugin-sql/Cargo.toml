# Vendored from https://github.com/tauri-apps/plugins-workspace branch `v1`
# at commit 1e407ed5, because the v1 plugin keeps `DbInstances` private and the
# app's `db_use_single_connection` command must reach into it to swap the
# connection pool. Local changes: `{ workspace = true }` fields inlined from
# the plugins-workspace root manifest, and `DbInstances` (plus its field) made
# `pub` in src/plugin.rs. Everything else is byte-identical to upstream.
[package]
name = "tauri-plugin-sql"
version = "0.0.0"
description = "Interface with SQL databases."
authors = ["Tauri Programme within The Commons Conservancy"]
license = "Apache-2.0 OR MIT"
edition = "2021"
rust-version = "1.80"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = "1"
log = "0.4"
thiserror = "1"
futures-core = "0.3"
sqlx = { version = "0.8", features = ["json", "time"] }
time = "0.3"
tokio = { version = "1", features = ["sync"] }

[features]
sqlite = ["sqlx/sqlite", "sqlx/runtime-tokio"]
mysql = ["sqlx/mysql", "sqlx/runtime-tokio-rustls"]
postgres = ["sqlx/postgres", "sqlx/runtime-tokio-rustls"]
