# Windows 7 support via the Tier-3 `x86_64-win7-windows-msvc` target.
#
# The standard `x86_64-pc-windows-msvc` target dropped Windows 7 in Rust 1.78,
# but staying on stable 1.77 is unworkable: the modern crate ecosystem now ships
# releases using the Rust 2024 edition (`edition2024`), which 1.77's cargo can't
# even parse. Instead we use a modern *nightly* — which compiles those crates
# fine — and target Win7 through the Tier-3 `*-win7-windows-msvc` target.
#
# That target has no prebuilt std, so std is compiled from source via
# `-Z build-std` (enabled per-build in CI, see .github/workflows/release.yml);
# `rust-src` is required for that.
[toolchain]
channel = "nightly-2025-12-01"
components = ["rust-src", "clippy", "rustfmt"]
