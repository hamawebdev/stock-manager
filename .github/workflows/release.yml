name: Release

# Build the Windows 7 x64 installer when a v* tag is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    # Windows 7 x64 is the only supported target, so build a single Windows job.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          # Nightly + rust-src to build std from source for the Tier-3 Win7
          # target (matches src-tauri/rust-toolchain.toml).
          toolchain: "nightly-2025-12-01"
          components: rust-src

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Compile std from source for the Tier-3 Win7 target (no prebuilt std).
          # Requires the nightly toolchain + rust-src installed above.
          CARGO_UNSTABLE_BUILD_STD: "std,panic_abort"
          # Uncomment after generating signing keys with `npm run tauri signer generate`
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Atelier ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          # Build for the Tier-3 Windows 7 target.
          args: --target x86_64-win7-windows-msvc
