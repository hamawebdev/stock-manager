name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc --noEmit

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        # Tauri v1 links against webkit2gtk-4.0 / libsoup2 (v2 used 4.1 / soup3).
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@master
        with:
          # Nightly to match src-tauri/rust-toolchain.toml (needed to parse the
          # modern edition-2024 crates in the tree). This job lints on the Linux
          # host; the Win7 tier-3 target + build-std only run in release.yml.
          toolchain: "nightly-2025-12-01"
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
